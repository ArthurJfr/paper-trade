name: paper-trade

services:
  db:
    image: postgres:16-alpine
    container_name: paper-trade-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-paper_trade}
      POSTGRES_USER: ${POSTGRES_USER:-paper_trade}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-paper_trade_pwd}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-paper_trade} -d ${POSTGRES_DB:-paper_trade}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: paper-trade-api:latest
    container_name: paper-trade-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      API_PORT: 4000
      INITIAL_BALANCE_USDC: ${INITIAL_BALANCE_USDC:-10000}
      TRADING_FEE_BPS: ${TRADING_FEE_BPS:-10}
      REQUIRE_AUTH: ${REQUIRE_AUTH:-false}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      API_USER: ${API_USER:-admin}
      API_PASSWORD: ${API_PASSWORD:-admin}
      DATABASE_URL: postgresql://${POSTGRES_USER:-paper_trade}:${POSTGRES_PASSWORD:-paper_trade_pwd}@db:5432/${POSTGRES_DB:-paper_trade}
    ports:
      - "${API_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: paper-trade:latest
    container_name: paper-trade
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

    env_file:
      - .env

    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      # NUXT_* override le runtimeConfig Nuxt au runtime (seule variable reconnue
      # par Nitro après build). Les BACKEND_* sont conservés pour la symétrie et
      # d'éventuels consommateurs hors-Nuxt.
      BACKEND_API_URL: http://api:4000
      BACKEND_API_BASE_PATH: ${BACKEND_API_BASE_PATH:-/api/v1}
      NUXT_BACKEND_API_URL: http://api:4000
      NUXT_BACKEND_API_BASE_PATH: ${BACKEND_API_BASE_PATH:-/api/v1}

    ports:
      - "${APP_PORT:-3000}:3000"

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  app-dev:
    image: node:20-alpine
    container_name: paper-trade-dev
    profiles: ["dev"]
    working_dir: /app
    command: sh -c "corepack enable && npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3000
      HOST: 0.0.0.0
      BACKEND_API_URL: http://api:4000
      BACKEND_API_BASE_PATH: ${BACKEND_API_BASE_PATH:-/api/v1}
      NUXT_BACKEND_API_URL: http://api:4000
      NUXT_BACKEND_API_BASE_PATH: ${BACKEND_API_BASE_PATH:-/api/v1}
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - ./:/app
      - app-node-modules:/app/node_modules
    tty: true
    stdin_open: true

  adminer:
    image: adminer:4
    container_name: paper-trade-adminer
    profiles: ["tools"]
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${ADMINER_PORT:-8080}:8080"

volumes:
  db-data:
  app-node-modules:
